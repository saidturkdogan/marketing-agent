version: "3.9"

# ─── Shared environment (override in .env) ────────────────────────────────────
x-app-env: &app-env
  GOOGLE_API_KEY: ${GOOGLE_API_KEY}
  GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.0-flash}
  DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-secret}@postgres:5432/marketing_agent
  REDIS_URL: redis://redis:6379/0
  TWITTER_API_KEY: ${TWITTER_API_KEY:-}
  LINKEDIN_ACCESS_TOKEN: ${LINKEDIN_ACCESS_TOKEN:-}
  META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
  WP_URL: ${WP_URL:-}

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: marketing_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Application ─────────────────────────────────────────────────────────────

  api:
    build: .
    restart: unless-stopped
    command: uvicorn api:app --host 0.0.0.0 --port 8080 --workers 2
    environment:
      <<: *app-env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - outputs:/app/outputs

  worker:
    build: .
    restart: unless-stopped
    command: python worker.py
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - outputs:/app/outputs
    deploy:
      replicas: 2   # run 2 parallel workers

volumes:
  postgres_data:
  redis_data:
  outputs:
